<div class="utility-dashboard-container">

  <!-- Header -->
  <revelton-utility-header
    [propertyName]="vm.propertyName">
  </revelton-utility-header>

  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="vm.isLoading">
    <div class="modern-loader">
      <mat-icon>autorenew</mat-icon>
    </div>
    <span class="loading-text">Scanning utility devices...</span>
  </div>

  <!-- Main Content -->
  <div class="dashboard-content" [class.is-loading]="vm.isLoading">
    <revelton-ev-charger-panel
      [chargers]="vm.chargers"
      [activeSockets]="vm.activeSockets"
      [totalSockets]="vm.totalSockets"
      [totalPower]="vm.totalPowerKw"
      [totalEnergy]="vm.totalEnergyKwh"
      [activeSessions]="vm.activeSessions"
      [activeFaults]="vm.activeFaults">
    </revelton-ev-charger-panel>
  </div>

</div>
