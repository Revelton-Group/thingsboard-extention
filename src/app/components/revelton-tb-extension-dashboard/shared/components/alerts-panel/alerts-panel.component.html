<div class="section-container">
    <div class="section-label">
        <i class="material-icons" style="font-size: 12px">notifications</i>
        {{ t.activeAlerts | uppercase }} ({{ alerts.length }})
    </div>
    <div class="alerts-scroll">
        <div class="alert-item" *ngFor="let a of alerts; trackBy: trackById" [ngClass]="a.severity">
            <div class="alert-header">
                <i class="material-icons alert-icon"
                    [style.color]="a.severity === 'critical' ? '#FF3B30' : '#FF9500'">
                    {{ a.severity === 'critical' ? 'error' : 'warning' }}
                </i>
                <div>
                    <div class="alert-title">{{ a.title }}</div>
                    <div class="alert-message">{{ a.message }}</div>
                    <div class="alert-time">{{ a.time }}</div>
                </div>
            </div>
            <button class="ack-btn" (click)="onAcknowledge(a)">
                <i class="material-icons" style="font-size: 10px">check</i> {{ t.details }}
            </button>
        </div>
        <div class="all-clear" *ngIf="alerts.length === 0">
            <i class="material-icons">check_circle</i>
            <span>{{ t.noLeak }}</span>
        </div>
    </div>
</div>
